<!doctype html>
<html lang="en">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>GoShare</title>
	<link rel="stylesheet" href="styles.css" />
</head>

<body>
	<main class="app-shell">
		<header class="hero">
			<div>
				<p class="eyebrow">GoShare</p>
				<h1>Simple file sharing over WiFi</h1>
				<p id="deviceLabel" class="device-label">Loading device identity...</p>
			</div>
		</header>

		<section class="grid-layout">
			<article class="panel devices-panel">
				<div class="panel-header">
					<h2>Devices</h2>
					<span id="deviceCount" class="subtle">0 online</span>
				</div>
				<div id="deviceList" class="device-list"></div>
			</article>

			<article class="panel send-panel">
				<div class="panel-header send-panel-header">
					<h2>Send Files</h2>
					<button id="sendBtn" class="btn btn-primary">Send</button>
				</div>

				<div id="sendDropzone" class="send-dropzone" role="button" tabindex="0" aria-label="Select files or drop them here">
					<div class="send-dropzone-icon" aria-hidden="true">
						<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round" class="icon icon-tabler icons-tabler-outline icon-tabler-upload"><path stroke="none" d="M0 0h24v24H0z" fill="none" /><path d="M12 3l0 12" /><path d="M16 7l-4 -4l-4 4" /><path d="M4 15l0 2a2 2 0 0 0 2 2l12 0a2 2 0 0 0 2 -2l0 -2" /></svg>
					</div>
					<h3 class="send-dropzone-title">Drag Files Into This Area</h3>
					<p class="send-dropzone-copy">Select files to show them here, or click this area to choose files.</p>
					<div id="selectedFiles" class="selected-files"></div>
				</div>
			</article>

			<article id="transfersDrawer" class="panel transfers-panel transfer-drawer">
				<div class="panel-header">
					<h2>Transfers</h2>
					<button id="transferDrawerCloseBtn" class="btn btn-ghost icon-close-btn" type="button" aria-label="Close transfers">
						<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round" class="icon icon-tabler icons-tabler-outline icon-tabler-x"><path stroke="none" d="M0 0h24v24H0z" fill="none" /><path d="M18 6l-12 12" /><path d="M6 6l12 12" /></svg>
					</button>
				</div>
				<div id="transferList" class="transfer-list"></div>
			</article>

			<div id="transferBackdrop" class="transfer-backdrop" aria-hidden="true"></div>
		</section>
	</main>

	<button id="transferDrawerToggle" class="transfer-fab" type="button" aria-label="Open transfers" aria-expanded="false" aria-controls="transfersDrawer">
		<span class="transfer-fab-icon" aria-hidden="true">
			<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round" class="icon icon-tabler icons-tabler-outline icon-tabler-history"><path stroke="none" d="M0 0h24v24H0z" fill="none" /><path d="M12 8l0 4l2 2" /><path d="M3.05 11a9 9 0 1 1 .5 4m-.5 5v-5h5" /></svg>
		</span>
		<span id="transferDrawerBadge" class="transfer-fab-badge" hidden>0</span>
	</button>

	<div id="decisionModal" class="modal-backdrop" aria-hidden="true">
		<div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="decisionModalTitle" aria-describedby="decisionModalBody">
			<div class="modal-header">
				<p id="decisionModalKicker" class="modal-title">Incoming Transfer</p>
				<button id="decisionModalClose" class="modal-close icon-close-btn" type="button" aria-label="Reject transfer">
					<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round" class="icon icon-tabler icons-tabler-outline icon-tabler-x"><path stroke="none" d="M0 0h24v24H0z" fill="none" /><path d="M18 6l-12 12" /><path d="M6 6l12 12" /></svg>
				</button>
			</div>
			<div class="modal-body">
				<div class="modal-icon" aria-hidden="true">
					<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round" class="icon icon-tabler icons-tabler-outline icon-tabler-progress-down"><path stroke="none" d="M0 0h24v24H0z" fill="none" /><path d="M10 20.777a8.942 8.942 0 0 1 -2.48 -.969" /><path d="M14 3.223a9.003 9.003 0 0 1 0 17.554" /><path d="M4.579 17.093a8.961 8.961 0 0 1 -1.227 -2.592" /><path d="M3.124 10.5c.16 -.95 .468 -1.85 .9 -2.675l.169 -.305" /><path d="M6.907 4.579a8.954 8.954 0 0 1 3.093 -1.356" /><path d="M12 9v6" /><path d="M15 12l-3 3l-3 -3" /></svg>
				</div>
				<h3 id="decisionModalTitle" class="modal-heading">File request received</h3>
				<p id="decisionModalBody" class="modal-description">A device wants to send files to this receiver.</p>
			</div>
			<div class="modal-actions">
				<button id="decisionModalCancel" class="btn btn-ghost" type="button">Reject</button>
				<button id="decisionModalConfirm" class="btn btn-primary" type="button">Confirm</button>
			</div>
		</div>
	</div>

	<script src="app.js"></script>
</body>

</html>
