<!doctype html>
<html lang="en">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>GoShare</title>
	<link rel="stylesheet" href="styles.css" />
</head>

<body>
	<main class="app-shell">
		<header class="hero">
			<div>
				<p class="eyebrow">GoShare</p>
				<h1>Simple file sharing over WiFi</h1>
				<p id="deviceLabel" class="device-label">Loading device identity...</p>
			</div>
		</header>

		<section class="grid-layout">
			<article class="panel devices-panel">
				<div class="panel-header">
					<h2>Devices</h2>
					<span id="deviceCount" class="subtle">0 online</span>
				</div>
				<div id="deviceList" class="device-list"></div>
			</article>

			<article class="panel send-panel">
				<div class="panel-header">
					<h2>Send Files</h2>
				</div>

				<div class="actions-row">
					<button id="pickFilesBtn" class="btn btn-ghost">Select Files</button>
					<button id="sendBtn" class="btn btn-primary">Send</button>
				</div>

				<div id="selectedFiles" class="selected-files"></div>
			</article>

			<article class="panel transfers-panel">
				<div class="panel-header">
					<h2>Transfers</h2>
				</div>
				<div id="transferList" class="transfer-list"></div>
			</article>
		</section>
	</main>

	<script src="app.js"></script>
</body>

</html>
